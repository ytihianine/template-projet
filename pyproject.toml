# =============================================================================
# project - pyproject.toml
# =============================================================================

# ---------------------------------------------------------------------------
# Dependencies
# ---------------------------------------------------------------------------

[dependency-groups]

default = [
    "pydantic-settings==2.14.2",
]


# ---- Development -----------------------------------------------------------

dev = [
    "pytest==9.1.1",
    "pre-commit==4.6.1",
]


# ---------------------------------------------------------------------------
# Black
# ---------------------------------------------------------------------------

[tool.black]

line-length = 130
target-version = ["py314"]


# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------

[tool.ruff]

line-length = 130
target-version = "py312"

src = [
    "src",
    "tests",
]


[tool.ruff.lint]

select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "UP",
    "SIM",
    "TCH",
    "RUF",
]

ignore = [
    "E501",
]


[tool.ruff.lint.isort]

known-first-party = [
    "project",
]


# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]

testpaths = [
    "tests",
]

python_files = [
    "test_*.py",
    "*_test.py",
]

python_classes = [
    "Test*",
]

python_functions = [
    "test_*",
]

addopts = [
    "--strict-markers",
    "--tb=short",
]
